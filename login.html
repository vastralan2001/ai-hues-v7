<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / 登录 — AIHues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;--surface:#f8f9fb;--surface-hover:#f1f3f7;
      --border:#e8ecf1;--border-hover:#d1d8e0;
      --text:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
      --accent:#6d28d9;--accent-light:#8b5cf6;--accent-gradient:linear-gradient(135deg,#6d28d9,#8b5cf6);
      --green:#059669;--green-bg:#ecfdf5;--blue:#2563eb;--orange:#ea580c;--red:#dc2626;
      --radius:14px;--radius-sm:10px;
      --shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.04);
      --shadow-hover:0 4px 12px rgba(109,40,217,0.12),0 8px 32px rgba(0,0,0,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text)}
    body{display:flex;overflow:hidden}

    /* ========== LEFT BRAND PANEL ========== */
    .brand-panel{
      width:50%;min-height:100vh;
      background:linear-gradient(160deg,#0f0a1e 0%,#1a1040 50%,#0f0a1e 100%);
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:48px;position:relative;overflow:hidden;
    }
    .brand-panel::before{
      content:'';position:absolute;top:-30%;right:-30%;width:80%;height:80%;
      background:radial-gradient(circle,rgba(109,40,217,0.35) 0%,transparent 70%);
      pointer-events:none;
    }
    .brand-panel::after{
      content:'';position:absolute;bottom:-20%;left:-20%;width:60%;height:60%;
      background:radial-gradient(circle,rgba(139,92,246,0.2) 0%,transparent 70%);
      pointer-events:none;
    }
    .brand-content{position:relative;z-index:2;text-align:center;max-width:420px}
    .brand-logo{
      display:inline-flex;align-items:center;gap:12px;margin-bottom:32px;
    }
    .brand-logo-mark{
      width:52px;height:52px;border-radius:var(--radius-sm);
      background:var(--accent-gradient);
      display:flex;align-items:center;justify-content:center;
      font-size:26px;font-weight:800;color:#fff;
      box-shadow:0 4px 16px rgba(109,40,217,0.4);
    }
    .brand-logo-text{
      font-size:32px;font-weight:800;color:#fff;letter-spacing:-0.5px;
    }
    .brand-slogan{
      font-size:20px;font-weight:500;color:rgba(255,255,255,0.85);
      margin-bottom:12px;line-height:1.5;
    }
    .brand-slogan-zh{
      font-size:15px;color:rgba(255,255,255,0.5);margin-bottom:40px;
    }
    .brand-stats{
      display:flex;gap:32px;justify-content:center;
      padding-top:32px;border-top:1px solid rgba(255,255,255,0.1);
    }
    .stat-item{text-align:center}
    .stat-number{
      font-size:28px;font-weight:700;
      background:linear-gradient(135deg,#a78bfa,#8b5cf6);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .stat-label{
      font-size:13px;color:rgba(255,255,255,0.45);margin-top:4px;
    }
    .brand-dots{
      position:absolute;inset:0;pointer-events:none;z-index:1;
    }
    .brand-dots span{
      position:absolute;width:3px;height:3px;border-radius:50%;
      background:rgba(139,92,246,0.25);
    }

    /* ========== RIGHT FORM PANEL ========== */
    .form-panel{
      width:50%;min-height:100vh;
      background:var(--bg);
      display:flex;flex-direction:column;
      overflow-y:auto;
    }

    /* ========== NAV ========== */
    .top-nav{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 40px;border-bottom:1px solid var(--border);
      background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);
      position:sticky;top:0;z-index:10;
    }
    .nav-logo{
      display:flex;align-items:center;gap:8px;text-decoration:none;
    }
    .nav-logo-mark{
      width:34px;height:34px;border-radius:8px;
      background:var(--accent-gradient);
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:700;color:#fff;
    }
    .nav-logo-text{
      font-size:18px;font-weight:700;color:var(--text);
    }
    .nav-links{display:flex;gap:28px;align-items:center}
    .nav-links a{
      text-decoration:none;color:var(--text-secondary);font-size:14px;font-weight:500;
      transition:color .2s;
    }
    .nav-links a:hover{color:var(--accent)}
    .nav-login-btn{
      padding:7px 18px;border-radius:8px;background:var(--accent-gradient);
      color:#fff;font-size:13px;font-weight:600;text-decoration:none;
      border:none;cursor:pointer;
    }

    /* ========== FORM AREA ========== */
    .form-area{
      flex:1;display:flex;flex-direction:column;justify-content:center;
      padding:40px 64px;max-width:520px;margin:0 auto;width:100%;
    }
    .form-header{margin-bottom:32px}
    .form-header h1{
      font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px;
    }
    .form-header p{
      font-size:14px;color:var(--text-secondary);
    }
    .form-zh{
      font-size:13px;color:var(--text-muted);margin-top:2px;
    }

    /* Input groups */
    .form-group{margin-bottom:20px;position:relative}
    .form-label{
      display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px;
    }
    .form-input{
      width:100%;padding:12px 16px;font-size:14px;font-family:inherit;
      border:1.5px solid var(--border);border-radius:var(--radius-sm);
      background:var(--surface);color:var(--text);
      transition:border-color .2s,box-shadow .2s,background .2s;
      outline:none;
    }
    .form-input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(109,40,217,0.08);
      background:var(--bg);
    }
    .form-input.error{
      border-color:var(--red);background:#fef2f2;
    }
    .form-input.error:focus{box-shadow:0 0 0 3px rgba(220,38,38,0.08)}
    .error-msg{
      font-size:12px;color:var(--red);margin-top:4px;display:none;
    }
    .error-msg.show{display:block}

    /* Password toggle */
    .password-wrap{position:relative}
    .password-toggle{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:4px;
      color:var(--text-muted);display:flex;align-items:center;justify-content:center;
      transition:color .2s;
    }
    .password-toggle:hover{color:var(--accent)}
    .password-toggle svg{width:18px;height:18px}

    /* Password strength */
    .strength-bar{
      display:flex;gap:4px;margin-top:6px;height:4px;
    }
    .strength-segment{
      flex:1;border-radius:2px;background:var(--border);
      transition:background .3s;
    }
    .strength-segment.weak{background:var(--red)}
    .strength-segment.medium{background:var(--orange)}
    .strength-segment.strong{background:var(--green)}
    .strength-text{
      font-size:11px;margin-top:4px;font-weight:500;display:none;
    }
    .strength-text.show{display:block}
    .strength-text.weak{color:var(--red)}
    .strength-text.medium{color:var(--orange)}
    .strength-text.strong{color:var(--green)}

    /* Checkbox */
    .checkbox-row{
      display:flex;align-items:center;gap:8px;margin-bottom:20px;
    }
    .checkbox-row input[type="checkbox"]{
      width:16px;height:16px;accent-color:var(--accent);cursor:pointer;
    }
    .checkbox-row label{
      font-size:13px;color:var(--text-secondary);cursor:pointer;
    }

    /* Buttons */
    .btn{
      width:100%;padding:13px 20px;border-radius:var(--radius-sm);
      font-size:14px;font-weight:600;font-family:inherit;
      border:none;cursor:pointer;transition:all .25s ease;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-primary{
      background:var(--accent-gradient);color:#fff;
      box-shadow:0 2px 8px rgba(109,40,217,0.25);
    }
    .btn-primary:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(109,40,217,0.35);
    }
    .btn-primary:active{transform:translateY(0)}
    .btn-outline{
      background:var(--bg);color:var(--text);
      border:1.5px solid var(--border);
    }
    .btn-outline:hover{
      border-color:var(--accent);color:var(--accent);
      transform:translateY(-2px);box-shadow:var(--shadow-hover);
    }

    /* Divider */
    .divider{
      display:flex;align-items:center;gap:16px;margin:20px 0;
      color:var(--text-muted);font-size:12px;
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;background:var(--border);
    }

    /* Bottom link */
    .form-bottom{
      text-align:center;margin-top:20px;
      font-size:13px;color:var(--text-secondary);
    }
    .form-bottom a{
      color:var(--accent);font-weight:600;text-decoration:none;
      cursor:pointer;
    }
    .form-bottom a:hover{text-decoration:underline}

    /* Toast */
    .toast{
      position:fixed;top:24px;right:24px;z-index:1000;
      padding:14px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;
      display:flex;align-items:center;gap:10px;
      transform:translateX(140%);opacity:0;
      transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;
      box-shadow:var(--shadow-hover);
      max-width:360px;
    }
    .toast.show{transform:translateX(0);opacity:1}
    .toast-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(5,150,105,.2)}
    .toast-error{background:#fef2f2;color:var(--red);border:1px solid rgba(220,38,38,.2)}
    .toast svg{flex-shrink:0;width:18px;height:18px}

    /* View toggle */
    .view-section{display:none}
    .view-section.active{display:block;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ========== RESPONSIVE ========== */
    @media(max-width:768px){
      body{flex-direction:column;overflow:auto;height:auto}
      .brand-panel{
        width:100%;min-height:auto;padding:40px 24px 36px;
      }
      .brand-logo{margin-bottom:20px}
      .brand-logo-text{font-size:24px}
      .brand-slogan{font-size:16px}
      .brand-slogan-zh{margin-bottom:24px}
      .brand-stats{padding-top:20px;gap:24px}
      .stat-number{font-size:22px}
      .form-panel{width:100%;min-height:auto}
      .top-nav{padding:12px 20px}
      .nav-links{display:none}
      .form-area{padding:32px 24px}
    }

    /* Guest icon in button */
    .btn svg{width:16px;height:16px}
  </style>
</head>
<body>

  <!-- ===== LEFT BRAND PANEL ===== -->
  <div class="brand-panel">
    <div class="brand-dots" id="brandDots"></div>
    <div class="brand-content">
      <div class="brand-logo">
        <div class="brand-logo-mark">H</div>
        <div class="brand-logo-text">AIHues</div>
      </div>
      <div class="brand-slogan" data-zh="找到你的 AI vibe">Find your AI vibe</div>
      <div class="brand-slogan-zh">找到你的 AI vibe</div>
      <div class="brand-stats">
        <div class="stat-item">
          <div class="stat-number">17+</div>
          <div class="stat-label">Tools</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">3</div>
          <div class="stat-label">Games</div>
        </div>
        <div class="stat-item">
          <div class="stat-number">100%</div>
          <div class="stat-label">Free</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== RIGHT FORM PANEL ===== -->
  <div class="form-panel">
    <!-- Nav -->
    <nav class="top-nav">
      <a href="./index.html" class="nav-logo">
        <div class="nav-logo-mark">H</div>
        <span class="nav-logo-text">AIHues</span>
      </a>
      <div class="nav-links">
        <a href="./index.html">Home</a>
        <a href="./tools.html">Tools</a>
        <a href="./games.html">Games</a>
        <button class="nav-login-btn" onclick="showLogin()">Login</button>
      </div>
    </nav>

    <!-- Form Area -->
    <div class="form-area">

      <!-- ===== LOGIN VIEW ===== -->
      <div id="loginView" class="view-section active">
        <div class="form-header">
          <h1>Welcome back</h1>
          <p>Sign in to your account</p>
          <div class="form-zh" data-zh="欢迎回来">欢迎回来</div>
        </div>

        <div class="form-group">
          <label class="form-label">Username / 用户名</label>
          <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username">
          <div class="error-msg" id="loginUsernameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password / 密码</label>
          <div class="password-wrap">
            <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password">
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword',this)" aria-label="Toggle password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="error-msg" id="loginPasswordError"></div>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Remember me / 记住我</label>
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Login / 登录
        </button>

        <div class="divider">OR</div>

        <button class="btn btn-outline" onclick="handleGuest()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Play as Guest / 游客模式
        </button>

        <div class="form-bottom">
          Don't have an account? <a onclick="showSignup()">Sign up / 去注册</a>
        </div>
      </div>

      <!-- ===== SIGNUP VIEW ===== -->
      <div id="signupView" class="view-section">
        <div class="form-header">
          <h1>Create account</h1>
          <p>Sign up for a new account</p>
          <div class="form-zh" data-zh="创建账号">创建账号</div>
        </div>

        <div class="form-group">
          <label class="form-label">Username / 用户名 (3-20 chars, letters, numbers, _)</label>
          <input type="text" id="signupUsername" class="form-input" placeholder="Choose a username">
          <div class="error-msg" id="signupUsernameError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Password / 密码 (at least 6 characters)</label>
          <div class="password-wrap">
            <input type="password" id="signupPassword" class="form-input" placeholder="Create a password" oninput="checkStrength()">
            <button type="button" class="password-toggle" onclick="togglePassword('signupPassword',this)" aria-label="Toggle password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar" id="strengthBar">
            <div class="strength-segment"></div>
            <div class="strength-segment"></div>
            <div class="strength-segment"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
          <div class="error-msg" id="signupPasswordError"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password / 确认密码</label>
          <div class="password-wrap">
            <input type="password" id="signupConfirm" class="form-input" placeholder="Confirm your password">
            <button type="button" class="password-toggle" onclick="togglePassword('signupConfirm',this)" aria-label="Toggle password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="error-msg" id="signupConfirmError"></div>
        </div>

        <button class="btn btn-primary" onclick="handleSignup()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Sign Up / 注册
        </button>

        <div class="form-bottom">
          Already have an account? <a onclick="showLogin()">Login / 去登录</a>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
  // ========== DOTS DECORATION ==========
  (function(){
    const container=document.getElementById('brandDots');
    for(let i=0;i<30;i++){
      const s=document.createElement('span');
      s.style.left=Math.random()*100+'%';
      s.style.top=Math.random()*100+'%';
      s.style.opacity=0.1+Math.random()*0.3;
      s.style.width=s.style.height=(2+Math.random()*3)+'px';
      container.appendChild(s);
    }
  })();

  // ========== VIEW TOGGLE ==========
  function showLogin(){
    document.getElementById('loginView').classList.add('active');
    document.getElementById('signupView').classList.remove('active');
    clearErrors();
  }
  function showSignup(){
    document.getElementById('signupView').classList.add('active');
    document.getElementById('loginView').classList.remove('active');
    clearErrors();
  }

  // ========== PASSWORD TOGGLE ==========
  function togglePassword(inputId,btn){
    const input=document.getElementById(inputId);
    const isPw=input.type==='password';
    input.type=isPw?'text':'password';
    btn.innerHTML=isPw?
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94l9.88 9.88z"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19l-6.72-6.72"/><line x1="1" y1="1" x2="23" y2="23"/></svg>':
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  }

  // ========== PASSWORD STRENGTH ==========
  function checkStrength(){
    const pw=document.getElementById('signupPassword').value;
    const segs=document.querySelectorAll('.strength-segment');
    const txt=document.getElementById('strengthText');
    segs.forEach(s=>s.className='strength-segment');
    txt.className='strength-text';
    if(!pw){txt.classList.remove('show');return}
    let score=0;
    if(pw.length>=6)score++;
    if(pw.length>=8&&/[a-zA-Z]/.test(pw)&&/\d/.test(pw))score++;
    if(pw.length>=10&&/[a-zA-Z]/.test(pw)&&/\d/.test(pw)&&/[^a-zA-Z0-9]/.test(pw))score++;
    if(pw.length<8&&score===0)score=1;
    const labels=['','Weak / 弱','Medium / 中','Strong / 强'];
    const cls=['','weak','medium','strong'];
    for(let i=0;i<score;i++)segs[i].classList.add(cls[score]);
    txt.textContent=labels[score];
    txt.classList.add('show',cls[score]);
  }

  // ========== ERROR HANDLING ==========
  function clearErrors(){
    document.querySelectorAll('.form-input').forEach(i=>i.classList.remove('error'));
    document.querySelectorAll('.error-msg').forEach(e=>{e.textContent='';e.classList.remove('show')});
  }
  function showError(id,msg){
    const el=document.getElementById(id);
    el.textContent=msg;el.classList.add('show');
    el.previousElementSibling?.querySelector('.form-input')?.classList.add('error');
    const input=document.getElementById(id.replace('Error',''));
    if(input)input.classList.add('error');
  }

  // ========== TOAST ==========
  function showToast(msg,type){
    const t=document.getElementById('toast');
    t.className='toast toast-'+type;
    const icon=type==='success'?
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
    t.innerHTML=icon+'<span>'+msg+'</span>';
    requestAnimationFrame(()=>t.classList.add('show'));
    setTimeout(()=>t.classList.remove('show'),3000);
  }

  // ========== VALIDATION ==========
  function validateSignup(username,password,confirm){
    if(username.length<3)return'Username must be at least 3 characters / 用户名至少3个字符';
    if(!/^[a-zA-Z0-9_]+$/.test(username))return'Username can only contain letters, numbers and _ / 只能包含字母数字下划线';
    if(password.length<6)return'Password must be at least 6 characters / 密码至少6位';
    if(password!==confirm)return'Passwords do not match / 两次密码不一致';
    const users=JSON.parse(localStorage.getItem('aihues_users')||'[]');
    if(users.find(u=>u.username===username))return'Username already exists / 用户名已存在';
    return null;
  }
  function login(username,password){
    const users=JSON.parse(localStorage.getItem('aihues_users')||'[]');
    const user=users.find(u=>u.username===username&&u.password===password);
    if(!user)return'Invalid username or password / 用户名或密码错误';
    localStorage.setItem('aihues_current_user',JSON.stringify(user));
    if(!localStorage.getItem('aihues_credit'))localStorage.setItem('aihues_credit','100');
    return null;
  }
  function guestLogin(){
    const guest={username:'Guest',isGuest:true,credits:100};
    localStorage.setItem('aihues_current_user',JSON.stringify(guest));
    localStorage.setItem('aihues_credit','100');
  }

  // ========== HANDLERS ==========
  function handleLogin(){
    clearErrors();
    const u=document.getElementById('loginUsername').value.trim();
    const p=document.getElementById('loginPassword').value;
    if(!u){showError('loginUsernameError','Please enter username / 请输入用户名');return}
    if(!p){showError('loginPasswordError','Please enter password / 请输入密码');return}
    const err=login(u,p);
    if(err){showError('loginPasswordError',err);return}
    showToast('Welcome back, '+u+'!','success');
    setTimeout(()=>window.location.href='./index.html',800);
  }
  function handleSignup(){
    clearErrors();
    const u=document.getElementById('signupUsername').value.trim();
    const p=document.getElementById('signupPassword').value;
    const c=document.getElementById('signupConfirm').value;
    const err=validateSignup(u,p,c);
    if(err){
      if(err.includes('Username'))showError('signupUsernameError',err);
      else if(err.includes('match'))showError('signupConfirmError',err);
      else showError('signupPasswordError',err);
      return;
    }
    const users=JSON.parse(localStorage.getItem('aihues_users')||'[]');
    users.push({username:u,password:p,credits:100});
    localStorage.setItem('aihues_users',JSON.stringify(users));
    localStorage.setItem('aihues_current_user',JSON.stringify({username:u,password:p,credits:100}));
    if(!localStorage.getItem('aihues_credit'))localStorage.setItem('aihues_credit','100');
    showToast('Account created! Welcome, '+u+'!','success');
    setTimeout(()=>window.location.href='./index.html',800);
  }
  function handleGuest(){
    guestLogin();
    showToast('Playing as Guest / 以游客模式进入','success');
    setTimeout(()=>window.location.href='./index.html',800);
  }

  // ========== KEYBOARD ==========
  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      if(document.getElementById('loginView').classList.contains('active'))handleLogin();
      else handleSignup();
    }
  });

  // ========== CHECK ALREADY LOGGED IN ==========
  (function(){
    const cur=localStorage.getItem('aihues_current_user');
    if(cur){
      const u=JSON.parse(cur);
      if(!u.isGuest){
        showToast('Already logged in as '+u.username+'. Redirecting...','success');
        setTimeout(()=>window.location.href='./index.html',1200);
      }
    }
  })();
  </script>
</body>
</html>
