<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-zh="文本对比 / Diff — AIHues">Text Diff — AIHues</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--surface:#f8f9fb;--surface-hover:#f1f3f7;
  --border:#e8ecf1;--border-hover:#d1d8e0;
  --text:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
  --accent:#6d28d9;--accent-light:#8b5cf6;--accent-gradient:linear-gradient(135deg,#6d28d9,#8b5cf6);
  --green:#059669;--green-bg:#ecfdf5;--green-light:#d1fae5;
  --red:#dc2626;--red-bg:#fef2f2;--red-light:#fee2e2;
  --radius:14px;--radius-sm:10px;
  --shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.04);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}

.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-1px;text-decoration:none}
.logo-mark{width:34px;height:34px;border-radius:10px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;box-shadow:0 2px 8px rgba(109,40,217,0.3)}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{color:var(--text-secondary);font-size:14px;font-weight:500;transition:color .2s;text-decoration:none}
.nav-links a:hover{color:var(--text)}

.tool-page{max-width:1100px;margin:0 auto;padding:32px}

.tool-header{padding:32px 0 24px}
.tool-header .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:var(--surface);font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:16px;border:1px solid var(--border)}
.tool-header h1{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-0.5px}
.tool-header p{color:var(--text-secondary);font-size:15px;max-width:560px}
.tool-meta{display:flex;gap:16px;margin-top:16px}
.tool-meta .tag{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600}
.tool-meta .tag.free{background:#ecfdf5;color:var(--green)}

.diff-container{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:768px){.diff-container{grid-template-columns:1fr}}

.editor{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.editor-toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.editor-toolbar .label{font-size:13px;font-weight:600;color:var(--text-secondary)}
.editor-toolbar .tag{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--bg);border:1px solid var(--border)}
.editor-actions{display:flex;gap:8px}
.editor-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);font-size:12px;cursor:pointer;transition:all .2s}
.editor-btn:hover{border-color:var(--accent);color:var(--accent)}
.editor textarea{width:100%;min-height:200px;padding:20px;border:none;outline:none;font-size:14px;line-height:1.6;resize:vertical;color:var(--text);font-family:'Mono',monospace}

.compare-btn{display:block;width:100%;padding:16px;border-radius:var(--radius-sm);background:var(--accent-gradient);color:#fff;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:all .2s;margin-bottom:20px}
.compare-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(109,40,217,0.3)}

.result-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;min-height:200px}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.result-title{font-size:16px;font-weight:600}
.result-stats{display:flex;gap:16px;font-size:13px;color:var(--text-secondary)}
.result-stat{display:flex;align-items:center;gap:4px}
.result-content{font-family:'Mono',monospace;font-size:14px;line-height:1.8;white-space:pre-wrap}

.diff-line{padding:4px 12px;margin:2px 0;border-radius:4px}
.diff-line.add{background:var(--green-light);color:var(--green)}
.diff-line.rem{background:var(--red-light);color:var(--red)}
.diff-line.eq{background:transparent}
.diff-line .prefix{display:inline-block;width:20px;font-weight:600}

.actions{display:flex;gap:12px;justify-content:center;margin-top:20px}
.btn-clear{padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text-secondary);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-clear:hover{border-color:var(--accent);color:var(--accent)}

@media(max-width:768px){
  .nav-inner{padding:0 20px}
  .tool-page{padding:20px}
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="../index.html" class="logo">
      <div class="logo-mark">AI</div>
      <span>AIHues</span>
    </a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="../showcase.html">工具</a>
      <a href="../collection.html">收藏</a>
      <a href="../pricing.html">定价</a>
    </div>
  </div>
</nav>

<main class="tool-page">
  <div class="tool-header">
    <span class="badge">&#128295; Developer Tool</span>
    <h1 data-zh="文本对比 / Diff">Text Diff</h1>
    <p data-zh="对比两段文本的差异，高亮显示增删改，开发者必备">Compare two texts and highlight differences. Essential for developers.</p>
    <div class="tool-meta">
      <span class="tag free">&#128994; Free Forever</span>
    </div>
  </div>

  <div class="diff-container">
    <div class="editor">
      <div class="editor-toolbar">
        <span class="label" data-zh="原文">Original Text</span>
        <div class="editor-actions">
          <button class="editor-btn" onclick="pasteLeft()">&#128203; Paste</button>
          <button class="editor-btn" onclick="clearLeft()">Clear</button>
        </div>
      </div>
      <textarea id="left" placeholder="Paste original text here..."></textarea>
    </div>
    <div class="editor">
      <div class="editor-toolbar">
        <span class="label" data-zh="修改后">Modified Text</span>
        <div class="editor-actions">
          <button class="editor-btn" onclick="pasteRight()">&#128203; Paste</button>
          <button class="editor-btn" onclick="clearRight()">Clear</button>
        </div>
      </div>
      <textarea id="right" placeholder="Paste modified text here..."></textarea>
    </div>
  </div>

  <button class="compare-btn" onclick="compare()">&#128269; Compare Texts</button>

  <div class="result-area" id="resultArea" style="display:none">
    <div class="result-header">
      <span class="result-title" data-zh="对比结果">Diff Result</span>
      <div class="result-stats">
        <span class="result-stat">&#128994; <span id="addCount">0</span> added</span>
        <span class="result-stat">&#128308; <span id="remCount">0</span> removed</span>
      </div>
    </div>
    <div class="result-content" id="result"></div>
  </div>

  <div class="actions">
    <button class="btn-clear" onclick="clearAll()">&#128465;&#65039; Clear All</button>
  </div>
</main>

<script>
function compare(){
  const left = document.getElementById('left').value.split('\n');
  const right = document.getElementById('right').value.split('\n');
  const result = [];
  let addCount = 0, remCount = 0;
  const maxLen = Math.max(left.length, right.length);
  for (let i = 0; i < maxLen; i++){
    const l = left[i] || '';
    const r = right[i] || '';
    if (l === r){ result.push({type:'eq',text:l}); }
    else if (!l && r){ result.push({type:'add',text:r}); addCount++; }
    else if (l && !r){ result.push({type:'rem',text:l}); remCount++; }
    else { result.push({type:'rem',text:l}); result.push({type:'add',text:r}); addCount++; remCount++; }
  }
  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = result.map(r => {
    const prefix = r.type === 'add' ? '+' : r.type === 'rem' ? '-' : ' ';
    const cls = r.type === 'add' ? 'add' : r.type === 'rem' ? 'rem' : 'eq';
    return `<div class="diff-line ${cls}"><span class="prefix">${prefix}</span>${escapeHtml(r.text)}</div>`;
  }).join('');
  document.getElementById('addCount').textContent = addCount;
  document.getElementById('remCount').textContent = remCount;
  document.getElementById('resultArea').style.display = 'block';
}
function escapeHtml(text){
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
function pasteLeft(){ navigator.clipboard.readText().then(t => document.getElementById('left').value = t); }
function pasteRight(){ navigator.clipboard.readText().then(t => document.getElementById('right').value = t); }
function clearLeft(){ document.getElementById('left').value = ''; }
function clearRight(){ document.getElementById('right').value = ''; }
function clearAll(){
  document.getElementById('left').value = '';
  document.getElementById('right').value = '';
  document.getElementById('resultArea').style.display = 'none';
}
</script>
<script src="../js/i18n.js"></script>
</body>
</html>
