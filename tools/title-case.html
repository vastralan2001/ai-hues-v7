<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Title Case Converter | AI Hues Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --bg-card: #1c1c1c;
      --bg-card-hover: #242424;
      --bg-input: #141414;
      --border-color: #2a2a2a;
      --border-hover: #3a3a3a;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-muted: #707070;
      --accent: #c8a45e;
      --accent-hover: #d4b46e;
      --accent-dim: rgba(200, 164, 94, 0.15);
      --accent-border: rgba(200, 164, 94, 0.3);
      --success: #4ade80;
      --success-dim: rgba(74, 222, 128, 0.15);
      --danger: #f87171;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--border-color);
    }

    .header-tool-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .difficulty-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid var(--accent-border);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Main */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }

    /* Tool Hero */
    .tool-hero {
      margin-bottom: 32px;
    }

    .tool-hero h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .tool-hero p {
      color: var(--text-secondary);
      font-size: 1rem;
      max-width: 600px;
    }

    /* Input Section */
    .input-section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      transition: var(--transition);
    }

    .input-section:focus-within {
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .input-textarea {
      width: 100%;
      min-height: 140px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: var(--transition);
    }

    .input-textarea::placeholder {
      color: var(--text-muted);
    }

    .input-textarea:focus {
      border-color: var(--accent-border);
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: var(--accent);
    }

    .stat-content {
      display: flex;
      flex-direction: column;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* History */
    .history-section {
      margin-bottom: 24px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .history-clear {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }

    .history-clear:hover {
      color: var(--danger);
      background: rgba(248, 113, 113, 0.1);
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history-chip {
      font-size: 0.8rem;
      padding: 6px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--font-mono);
    }

    .history-chip:hover {
      border-color: var(--accent-border);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Results Grid */
    .results-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .results-title i {
      color: var(--accent);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    /* Result Card */
    .result-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: var(--transition);
    }

    .result-card:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .result-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
    }

    .result-card-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
    }

    .copy-btn:hover {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    .copy-btn.copied {
      color: var(--success);
      border-color: rgba(74, 222, 128, 0.3);
      background: var(--success-dim);
    }

    .result-card-body {
      padding: 16px;
      min-height: 60px;
    }

    .result-text {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-primary);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .result-text.placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: toastIn 0.3s ease-out;
      opacity: 1;
      transition: opacity 0.3s, transform 0.3s;
    }

    .toast.toast-out {
      opacity: 0;
      transform: translateX(100px);
    }

    .toast i {
      color: var(--success);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .results-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .main {
        padding: 24px 16px 40px;
      }

      .tool-hero h1 {
        font-size: 1.5rem;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .stats-bar {
        gap: 16px;
        flex-wrap: wrap;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-hover);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
<link rel="manifest" href="/manifest.json">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="../index.html" class="header-logo">AI Hues Dev</a>
        <div class="header-divider"></div>
        <span class="header-tool-name">Title Case Converter</span>
      </div>
      <div class="header-right">
        <span class="difficulty-badge">Free</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Tool Hero -->
    <div class="tool-hero">
      <h1>Title Case Converter</h1>
      <p>Convert text to various title case formats, sentence case, and more. Supports AP and Chicago styles.</p>
    </div>

    <!-- Input Section -->
    <div class="input-section">
      <div class="input-label">
        <i class="fas fa-keyboard"></i>
        Enter your text
      </div>
      <textarea
        class="input-textarea"
        id="inputText"
        placeholder="e.g. the quick brown fox jumps over the lazy dog"
        spellcheck="false"
      ></textarea>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-icon"><i class="fas fa-font"></i></div>
          <div class="stat-content">
            <span class="stat-value" id="statChars">0</span>
            <span class="stat-label">Characters</span>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-icon"><i class="fas fa-align-left"></i></div>
          <div class="stat-content">
            <span class="stat-value" id="statWords">0</span>
            <span class="stat-label">Words</span>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-icon"><i class="fas fa-bars"></i></div>
          <div class="stat-content">
            <span class="stat-value" id="statLines">0</span>
            <span class="stat-label">Lines</span>
          </div>
        </div>
      </div>
    </div>

    <!-- History -->
    <div class="history-section" id="historySection" style="display: none;">
      <div class="history-header">
        <span class="history-title"><i class="fas fa-clock-rotate-left"></i> Recent History</span>
        <button class="history-clear" id="clearHistory">Clear All</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <!-- Results -->
    <div class="results-title">
      <i class="fas fa-shuffle"></i>
      Converted Formats
    </div>

    <div class="results-grid" id="resultsGrid"></div>

  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ===== Configuration =====
    const HISTORY_KEY = 'titleCase_history';
    const HISTORY_MAX = 10;
    const DEBOUNCE_MS = 200;

    const FORMATS = [
      { id: 'original',    name: 'Original',            desc: '原文' },
      { id: 'sentence',    name: 'Sentence case',       desc: '句首大写' },
      { id: 'titleAP',     name: 'Title Case (AP)',     desc: '标题大小写 (AP风格)' },
      { id: 'titleChicago',name: 'Title Case (Chicago)',desc: '标题大小写 (Chicago风格)' },
      { id: 'upper',       name: 'ALL CAPS',            desc: '全大写' },
      { id: 'lower',       name: 'all lowercase',       desc: '全小写' },
      { id: 'camel',       name: 'camelCase',           desc: '驼峰 (首字母小写)' },
      { id: 'pascal',      name: 'PascalCase',          desc: '帕斯卡 (首字母大写)' },
      { id: 'snake',       name: 'snake_case',          desc: '蛇形下划线' },
      { id: 'kebab',       name: 'kebab-case',          desc: '短横线' },
      { id: 'dot',         name: 'dot.case',            desc: '点号' },
      { id: 'studly',      name: 'StUdLy CaPs',         desc: '随机大小写' },
    ];

    const apStopWords = ['a','an','the','and','but','or','for','nor','on','at','to','from','by','in','of','up','with','as'];
    const chicagoStopWords = ['a','an','the','and','but','or','for','nor','on','at','to','from','by','in','of'];

    // ===== DOM =====
    const $input = document.getElementById('inputText');
    const $resultsGrid = document.getElementById('resultsGrid');
    const $statChars = document.getElementById('statChars');
    const $statWords = document.getElementById('statWords');
    const $statLines = document.getElementById('statLines');
    const $historySection = document.getElementById('historySection');
    const $historyList = document.getElementById('historyList');
    const $clearHistory = document.getElementById('clearHistory');
    const $toastContainer = document.getElementById('toastContainer');

    // ===== Init =====
    function init() {
      buildCards();
      loadHistory();
      updateAll();

      $input.addEventListener('input', onInput);
      $clearHistory.addEventListener('click', clearHistory);
    }

    // ===== Build Cards =====
    function buildCards() {
      $resultsGrid.innerHTML = FORMATS.map(fmt => `
        <div class="result-card" data-format="${fmt.id}">
          <div class="result-card-header">
            <span class="result-card-name" title="${fmt.desc}">${fmt.name}</span>
            <button class="copy-btn" data-format="${fmt.id}" aria-label="Copy ${fmt.name}">
              <i class="fas fa-copy"></i>
              <span>Copy</span>
            </button>
          </div>
          <div class="result-card-body">
            <div class="result-text placeholder" data-result="${fmt.id}">Waiting for input...</div>
          </div>
        </div>
      `).join('');

      // Attach copy listeners
      $resultsGrid.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const fmtId = btn.dataset.format;
          copyFormat(fmtId, btn);
        });
      });
    }

    // ===== Debounced Input =====
    let debounceTimer = null;
    function onInput() {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        updateAll();
        saveToHistory($input.value.trim());
      }, DEBOUNCE_MS);
    }

    // ===== Update Everything =====
    function updateAll() {
      const text = $input.value;
      updateStats(text);
      updateResults(text);
    }

    // ===== Stats =====
    function updateStats(text) {
      $statChars.textContent = text.length.toLocaleString();

      if (!text.trim()) {
        $statWords.textContent = '0';
        $statLines.textContent = '0';
        return;
      }

      const words = text.trim().split(/\s+/).filter(w => w.length > 0);
      $statWords.textContent = words.length.toLocaleString();

      const lines = text.split(/\r?\n/);
      $statLines.textContent = lines.length.toLocaleString();
    }

    // ===== Conversion Functions =====
    function toTitleCaseAP(text) {
      return text.split(/\n/).map(line => {
        const words = line.trim().split(/\s+/).filter(w => w);
        if (!words.length) return line;
        return words.map((word, i) => {
          const lower = word.toLowerCase();
          if (i === 0 || i === words.length - 1 || !apStopWords.includes(lower)) {
            return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
          }
          return lower;
        }).join(' ');
      }).join('\n');
    }

    function toTitleCaseChicago(text) {
      return text.split(/\n/).map(line => {
        const words = line.trim().split(/\s+/).filter(w => w);
        if (!words.length) return line;
        return words.map((word, i) => {
          const lower = word.toLowerCase();
          if (i === 0 || i === words.length - 1 || !chicagoStopWords.includes(lower)) {
            return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
          }
          return lower;
        }).join(' ');
      }).join('\n');
    }

    function toSentenceCase(text) {
      return text.split(/\n/).map(line => {
        const trimmed = line.trim();
        if (!trimmed) return line;
        return trimmed.charAt(0).toUpperCase() + trimmed.slice(1).toLowerCase();
      }).join('\n');
    }

    function toCamelCase(text) {
      return text.split(/\n/).map(line => {
        const cleaned = line.replace(/[^a-zA-Z0-9]+/g, ' ').trim();
        if (!cleaned) return '';
        const words = cleaned.split(/\s+/);
        return words[0].toLowerCase() + words.slice(1).map(w =>
          w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
        ).join('');
      }).join('\n');
    }

    function toPascalCase(text) {
      return text.split(/\n/).map(line => {
        const cleaned = line.replace(/[^a-zA-Z0-9]+/g, ' ').trim();
        if (!cleaned) return '';
        return cleaned.split(/\s+/).map(w =>
          w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()
        ).join('');
      }).join('\n');
    }

    function toSnakeCase(text) {
      return text.split(/\n/).map(line => {
        const cleaned = line.replace(/[^a-zA-Z0-9]+/g, ' ').trim();
        if (!cleaned) return '';
        return cleaned.split(/\s+/).map(w => w.toLowerCase()).join('_');
      }).join('\n');
    }

    function toKebabCase(text) {
      return text.split(/\n/).map(line => {
        const cleaned = line.replace(/[^a-zA-Z0-9]+/g, ' ').trim();
        if (!cleaned) return '';
        return cleaned.split(/\s+/).map(w => w.toLowerCase()).join('-');
      }).join('\n');
    }

    function toDotCase(text) {
      return text.split(/\n/).map(line => {
        const cleaned = line.replace(/[^a-zA-Z0-9]+/g, ' ').trim();
        if (!cleaned) return '';
        return cleaned.split(/\s+/).map(w => w.toLowerCase()).join('.');
      }).join('\n');
    }

    function toStudlyCaps(text) {
      return text.split(/\n/).map(line => {
        return line.split('').map((ch, i) => {
          return i % 2 === 0 ? ch.toUpperCase() : ch.toLowerCase();
        }).join('');
      }).join('\n');
    }

    // ===== Convert & Display =====
    function convert(text, formatId) {
      if (!text) return '';
      switch (formatId) {
        case 'original':     return text;
        case 'sentence':     return toSentenceCase(text);
        case 'titleAP':      return toTitleCaseAP(text);
        case 'titleChicago': return toTitleCaseChicago(text);
        case 'upper':        return text.toUpperCase();
        case 'lower':        return text.toLowerCase();
        case 'camel':        return toCamelCase(text);
        case 'pascal':       return toPascalCase(text);
        case 'snake':        return toSnakeCase(text);
        case 'kebab':        return toKebabCase(text);
        case 'dot':          return toDotCase(text);
        case 'studly':       return toStudlyCaps(text);
        default:             return text;
      }
    }

    function updateResults(text) {
      FORMATS.forEach(fmt => {
        const $el = $resultsGrid.querySelector(`[data-result="${fmt.id}"]`);
        if (!$el) return;
        if (!text.trim()) {
          $el.textContent = 'Waiting for input...';
          $el.classList.add('placeholder');
        } else {
          $el.textContent = convert(text, fmt.id);
          $el.classList.remove('placeholder');
        }
      });
    }

    // ===== Copy =====
    async function copyFormat(formatId, btnEl) {
      const text = $input.value;
      if (!text.trim()) {
        showToast('Nothing to copy', 'warning');
        return;
      }
      const result = convert(text, formatId);
      try {
        await navigator.clipboard.writeText(result);
        showCopied(btnEl);
        showToast(`Copied ${FORMATS.find(f => f.id === formatId)?.name || formatId}`);
      } catch (err) {
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = result;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopied(btnEl);
        showToast(`Copied ${FORMATS.find(f => f.id === formatId)?.name || formatId}`);
      }
    }

    function showCopied(btn) {
      btn.classList.add('copied');
      const $icon = btn.querySelector('i');
      const $span = btn.querySelector('span');
      const oldIcon = $icon.className;
      $icon.className = 'fas fa-check';
      $span.textContent = 'Copied';
      setTimeout(() => {
        btn.classList.remove('copied');
        $icon.className = 'fas fa-copy';
        $span.textContent = 'Copy';
      }, 2000);
    }

    // ===== Toast =====
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
      $toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('toast-out');
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // ===== History =====
    function getHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function setHistory(items) {
      try {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_MAX)));
      } catch (e) {
        // localStorage might be full
      }
    }

    function saveToHistory(text) {
      if (!text) return;
      let items = getHistory();
      // Remove duplicates
      items = items.filter(item => item !== text);
      // Add to front
      items.unshift(text);
      setHistory(items);
      renderHistory();
    }

    function loadHistory() {
      renderHistory();
    }

    function renderHistory() {
      const items = getHistory();
      if (!items.length) {
        $historySection.style.display = 'none';
        return;
      }
      $historySection.style.display = '';
      $historyList.innerHTML = items.map(text => {
        const display = text.length > 40 ? text.slice(0, 40) + '...' : text;
        return `<button class="history-chip" title="${text.replace(/"/g, '&quot;')}">${display.replace(/</g, '&lt;')}</button>`;
      }).join('');

      $historyList.querySelectorAll('.history-chip').forEach((chip, i) => {
        chip.addEventListener('click', () => {
          $input.value = items[i];
          updateAll();
        });
      });
    }

    function clearHistory() {
      setHistory([]);
      renderHistory();
      showToast('History cleared');
    }

    // ===== Start =====
    init();
  </script>
<script src="../js/i18n.js"></script>
