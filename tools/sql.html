*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--surface:#f8f9fb;--surface-hover:#f1f3f7;

body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-1px;text-decoration:none}
.logo-mark{width:34px;height:34px;border-radius:10px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;box-shadow:0 2px 8px rgba(109,40,217,0.3)}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{color:var(--text-secondary);font-size:14px;font-weight:500;transition:color .2s;text-decoration:none}
.nav-links a:hover{color:var(--text)}
.nav-cta{padding:9px 20px;border-radius:10px;background:var(--accent-gradient);color:#fff;font-size:14px;font-weight:600;box-shadow:0 2px 8px rgba(109,40,217,0.25);transition:all .2s;display:flex;align-items:center;gap:6px;text-decoration:none}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(109,40,217,0.35)}
.tool-page{max-width:900px;margin:0 auto;padding:32px}
.tool-header{padding:32px 0 24px}
.tool-header .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:var(--surface);font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:16px;border:1px solid var(--border)}
.tool-header h1{font-size:32px;font-weight:700;margin-bottom:8px;letter-spacing:-0.5px}
.tool-header p{color:var(--text-secondary);font-size:15px;max-width:560px}
.tool-meta{display:flex;gap:16px;margin-top:16px}
.tool-meta .tag{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600}
.tool-meta .tag.credit{background:var(--green-bg);color:var(--green)}
.tool-meta .tag.free{background:var(--surface);color:var(--text-muted);border:1px solid var(--border)}
.editor{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.editor-toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.editor-toolbar .label{font-size:13px;font-weight:600;color:var(--text-secondary)}
.editor textarea{width:100%;min-height:200px;padding:20px;border:none;outline:none;font-size:15px;line-height:1.7;resize:vertical;color:var(--text);font-family:inherit}
.action-bar{display:flex;gap:12px;align-items:center;margin-bottom:20px}
.run-btn{padding:14px 36px;border-radius:10px;background:var(--accent-gradient);color:#fff;font-size:16px;font-weight:600;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(109,40,217,0.25)}
.run-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(109,40,217,0.35)}
.output-area{display:none}
.output-area.show{display:block}
.output{background:var(--bg);border:2px solid var(--green);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
.output-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--green-bg);border-bottom:1px solid rgba(5,150,105,0.2)}
.output-header .label{font-size:13px;font-weight:700;color:var(--green)}
.output-actions{display:flex;gap:8px}
.output-actions button{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;transition:all .2s}
.output-actions button:hover{background:var(--green);color:#fff}
.output-body{padding:20px;font-size:15px;line-height:1.7;min-height:100px;white-space:pre-wrap;word-break:break-word}
.skeleton-notice{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #f59e0b;border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;text-align:center}
.skeleton-notice p{font-size:14px;color:#92400e}
.footer{border-top:1px solid var(--border);padding:48px 32px;text-align:center;color:var(--text-muted);font-size:14px;margin-top:60px}
@media(max-width:768px){.tool-page{padding:20px}}

<div class="tool-page">
  <div class="tool-header">
    <div class="badge">💻 Developer</div>
    <h1 data-zh="SQL 查询">SQL Query</h1>
    <p data-zh="自然语言描述转SQL查询语句">Convert descriptions to SQL queries</p>
    <div class="tool-meta">
      <span class="tag credit">🪙 1cr · Good 76</span>

    </div>
  </div>

    <p>🚧 This tool is in demo mode. Full AI-powered features coming soon.</p>
  </div>
  <div class="editor">
    <div class="editor-toolbar"><span class="label">Input</span></div>
    <textarea id="input" placeholder="Enter your text here..."></textarea>
  </div>

    <button class="run-btn" onclick="generate()">Generate</button>
  </div>
  <div class="output-area" id="outputArea">
    <div class="output">
      <div class="output-header">
        <span class="label">Result</span>

<script>
function generate(){
  const desc = document.getElementById('input').value.trim();
  if(!desc){ alert('Please describe the query'); return; }
  const r = parseSQL(desc);
  let out = "## Generated SQL\n\n```sql\n" + r.sql + "\n```\n\n";
  out += "### Explanation\n" + r.explanation + "\n\n";
  out += "### Tips\n- Always test queries in a safe environment first\n";
  out += "- Use parameterized queries to prevent SQL injection\n";
  out += "- Add appropriate indexes for frequently queried columns\n\n";
  document.getElementById('output').textContent = out;
  document.getElementById('outputArea').classList.add('show');
}

function parseSQL(input){
  const d = input.toLowerCase().replace(/[，。！？、]/g, ' ').replace(/\s+/g, ' ').trim();
  const result = { sql: '', explanation: '' };

  // ── Table name detection ──
  const tableMap = {
    'user': 'users', '用户': 'users', '客户': 'customers', 'customer': 'customers',
    'order': 'orders', '订单': 'orders', 'product': 'products', '产品': 'products',
    'article': 'articles', '文章': 'articles', 'post': 'posts', '评论': 'comments',
    'comment': 'comments', 'category': 'categories', '分类': 'categories',
    'log': 'logs', '日志': 'logs', 'item': 'items', '商品': 'items',
    'employee': 'employees', '员工': 'employees', 'student': 'students', '学生': 'students',
  };
  let table = 'users'; // default
  for(const [cn, en] of Object.entries(tableMap)){
    if(d.includes(cn.toLowerCase())){ table = en; break; }
  }

  // ── Column detection ──
  const colMap = {
    'name': 'name', 'name': 'name', 'status': 'status',
    'created_at': 'created_at', '注册时间': 'created_at', '创建时间': 'created_at',
    'updated_at': 'updated_at', '更新时间': 'updated_at',
    'email': 'email', '邮箱': 'email',
    'price': 'price', '价格': 'price', 'amount': 'amount',
    'quantity': 'quantity', '数量': 'quantity',
    'count': 'COUNT(*)', 'count': 'COUNT(*)', '计数': 'COUNT(*)',
    'sum': 'SUM(amount)', 'sum': 'SUM(amount)', '求和': 'SUM(amount)',
    'avg': 'AVG(score)', 'average': 'AVG(score)', '平均': 'AVG(score)',
    'age': 'age', '年龄': 'age',
  };

  // ── Condition detection ──
  let conditions = [];
  const conditionMap = [
    { keys: ['活跃','active','activation','有效'], col: 'status', val: "= 'active'" },
    { keys: ['禁用','disabled','banned','封禁'], col: 'status', val: "= 'disabled'" },
    { keys: ['删除','deleted','已删'], col: 'deleted_at', val: 'IS NOT NULL' },
    { keys: ['未删除','not deleted','未删'], col: 'deleted_at', val: 'IS NULL' },
    { keys: ['男性','male','男'], col: 'gender', val: "= 'male'" },
    { keys: ['女性','female','女'], col: 'gender', val: "= 'female'" },
    { keys: ['vip','premium','付费','会员'], col: 'membership', val: "= 'premium'" },
    { keys: ['免费','free','普通'], col: 'membership', val: "= 'free'" },
    { keys: ['今天','today','今日'], col: 'DATE(created_at)', val: "= CURDATE()" },
    { keys: ['昨天','yesterday','昨日'], col: 'DATE(created_at)', val: "= CURDATE() - INTERVAL 1 DAY" },
    { keys: ['最近','recent','latest','近','最新'], col: 'created_at', val: ">= DATE_SUB(NOW(), INTERVAL 7 DAY)" },
  ];
  for(const c of conditionMap){
    for(const k of c.keys){ if(d.includes(k.toLowerCase())){ conditions.push(c.col + ' ' + c.val); break; } }
  }
  // Default condition from phrases
  if(conditions.length === 0 && (d.includes('where') || d.includes('的') || d.includes('满足'))){
    conditions.push("status = 'active'");
  }

  // ── ORDER BY detection ──
  let orderCol = '', orderDir = 'DESC';
  const orderMap = [
    { keys: ['时间','time','日期','date','创建'], col: 'created_at' },
    { keys: ['更新','update','修改'], col: 'updated_at' },
    { keys: ['名称','name','名字'], col: 'name' },
    { keys: ['价格','price','金额'], col: 'price' },
    { keys: ['数量','quantity','count','销量'], col: 'quantity' },
    { keys: ['分数','score','评分'], col: 'score' },
    { keys: ['id','编号','序号'], col: 'id' },
    { keys: ['年龄','age'], col: 'age' },
  ];
  if(d.includes('排序') || d.includes('order') || d.includes('sort') || d.includes('按')){
    for(const o of orderMap){
      for(const k of o.keys){ if(d.includes(k.toLowerCase())){ orderCol = o.col; break; } }
      if(orderCol) break;
    }
    if(!orderCol) orderCol = 'created_at';
    if(d.includes('升序') || d.includes('asc') || d.includes('从小到大') || d.includes('从低到高')) orderDir = 'ASC';
    else if(d.includes('降序') || d.includes('desc') || d.includes('从大到小') || d.includes('从高到低') || d.includes('倒序')) orderDir = 'DESC';
    else orderDir = 'DESC'; // default
  }

  // ── LIMIT detection ──
  let limit = '';
  const limitMatch = d.match(/(top|前|limit|最多)\s*(\d+)/) || d.match(/(\d+)\s*(条|个|行|记录)/);
  if(limitMatch) limit = parseInt(limitMatch[2] || limitMatch[1]);
  else if(d.includes('最近') || d.includes('recent') || d.includes('latest')) limit = 10;

  // ── GROUP BY detection ──
  let groupCol = '';
  if(d.includes('group') || d.includes('分组') || d.includes('按') && (d.includes('统计') || d.includes('汇总') || d.includes('计数'))){
    groupCol = conditions.length > 0 && conditions[0].includes('status') ? 'status' : 'category';
  }

  // ── JOIN detection ──
  let joinTable = '', joinCondition = '';
  const joinKeywords = d.includes('join') || d.includes('连接') || d.includes('关联') || (d.includes('和') && (d.includes('一起') || d.includes('同时')));
  if(joinKeywords){
    const otherTables = [];
    for(const [cn, en] of Object.entries(tableMap)){
      if(en !== table && d.includes(cn.toLowerCase())) otherTables.push(en);
    }
    if(otherTables.length > 0){ joinTable = otherTables[0]; joinCondition = table + '.id = ' + joinTable + '.' + table.replace(/s$/, '_id'); }
  }

  // ── Operation type ──
  const isInsert = d.includes('insert') || d.includes('插入') || d.includes('添加') || d.includes('新增') || d.includes('写入');
  const isUpdate = d.includes('update') || d.includes('更新') || d.includes('修改') || d.includes('改动') || d.includes('改');
  const isDelete = d.includes('delete') || d.includes('删除') || d.includes('移除') || d.includes('清除');
  const isCount = d.includes('count') || d.includes('统计') || d.includes('计数') || d.includes('多少') || d.includes('数量');
  const isSum = d.includes('sum') || d.includes('求和') || d.includes('总共') || d.includes('合计');
  const isAvg = d.includes('avg') || d.includes('average') || d.includes('平均') || d.includes('均值');
  const isMax = d.includes('max') || d.includes('最大') || d.includes('最高');
  const isMin = d.includes('min') || d.includes('最小') || d.includes('最低');

  // ── Build SQL ──
  let sql = '';
  let explanation = '';
  const whereClause = conditions.length > 0 ? 'WHERE ' + conditions.join(' AND ') : '';
  const orderClause = orderCol ? 'ORDER BY ' + orderCol + ' ' + orderDir : '';
  const limitClause = limit ? 'LIMIT ' + limit : '';

  if(isInsert){
    const cols = ['name', 'email', 'status', 'created_at'].join(', ');
    const vals = ["'John Doe'", "'john@example.com'", "'active'", "NOW()"].join(', ');
    sql = 'INSERT INTO ' + table + ' (' + cols + ')\nVALUES (' + vals + ');';
    explanation = 'Inserts a new row into `' + table + '` with sample data. Modify column values as needed.';
  } else if(isUpdate){
    sql = 'UPDATE ' + table + '\nSET status = \'active\', updated_at = NOW()\n' + whereClause + ';';
    explanation = 'Updates rows in `' + table + '` matching the detected conditions.';
  } else if(isDelete){
    sql = 'DELETE FROM ' + table + '\n' + whereClause + ';';
    explanation = '⚠️ Deletes rows from `' + table + '` matching the detected conditions. Always backup first!';
  } else if(isCount){
    const countWhere = conditions.length > 0 ? '\nWHERE ' + conditions.join(' AND ') : '';
    sql = 'SELECT COUNT(*) AS total\nFROM ' + table + countWhere + ';';
    explanation = 'Counts total rows in `' + table + '` matching the detected conditions.';
  } else if(isSum){
    sql = 'SELECT SUM(amount) AS total_amount\nFROM ' + table + '\n' + whereClause + ';';
    explanation = 'Calculates the sum of `amount` column in `' + table + '`.';
  } else if(isAvg){
    sql = 'SELECT AVG(score) AS average_score\nFROM ' + table + '\n' + whereClause + ';';
    explanation = 'Calculates the average of `score` column in `' + table + '`.';
  } else if(isMax){
    sql = 'SELECT MAX(price) AS max_price\nFROM ' + table + ';';
    explanation = 'Finds the maximum `price` in `' + table + '`.';
  } else if(isMin){
    sql = 'SELECT MIN(price) AS min_price\nFROM ' + table + ';';
    explanation = 'Finds the minimum `price` in `' + table + '`.';
  } else if(groupCol){
    sql = 'SELECT ' + groupCol + ', COUNT(*) AS count\nFROM ' + table + '\nGROUP BY ' + groupCol;
    if(orderCol) sql += '\nORDER BY count ' + orderDir;
    sql += ';';
    explanation = 'Groups results by `' + groupCol + '` and counts occurrences in `' + table + '`.';
  } else if(joinTable){
    sql = 'SELECT ' + table + '.*, ' + joinTable + '.*\nFROM ' + table + '\nJOIN ' + joinTable + ' ON ' + joinCondition;
    if(conditions.length > 0) sql += '\nWHERE ' + conditions.join(' AND ');
    sql += ';';
    explanation = 'Joins `' + table + '` with `' + joinTable + '` to retrieve combined data.';
  } else {
    // SELECT query
    const selectCols = d.includes('所有') || d.includes('all') || d.includes('全部') || d.includes('详细') || d.includes('信息') ? '*' : 'id, name, status, created_at';
    const parts = ['SELECT ' + selectCols + '\nFROM ' + table];
    if(conditions.length > 0) parts.push(whereClause);
    if(orderCol) parts.push(orderClause);
    if(limit) parts.push(limitClause);
    sql = parts.join('\n') + ';';
    explanation = 'Retrieves data from `' + table + '` matching your natural language description.';
  }

  return { sql: sql, explanation: explanation };
}
function copyOutput(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  alert('Copied!');
}
</script>
