<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Showcase — AIHues</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--surface:#f8f9fb;--border:#e8ecf1;--text:#0f172a;--text-secondary:#475569;--accent:#6d28d9;--accent-gradient:linear-gradient(135deg,#6d28d9,#8b5cf6);--radius:14px;--shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 16px rgba(0,0,0,0.04)}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;color:var(--text);letter-spacing:-1px;text-decoration:none}
.logo-mark{width:34px;height:34px;border-radius:10px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{color:var(--text-secondary);font-size:14px;font-weight:500;text-decoration:none}
.hero{text-align:center;padding:60px 32px 40px;background:var(--surface);border-bottom:1px solid var(--border)}
.hero h1{font-size:36px;font-weight:700;margin-bottom:8px}
.hero p{color:var(--text-secondary);font-size:16px}
.section{max-width:1300px;margin:0 auto;padding:48px 32px;text-align:center}
.section h2{font-size:24px;margin-bottom:12px}
.section p{color:var(--text-secondary);font-size:16px;margin-bottom:24px}
.btn{padding:12px 28px;border-radius:10px;background:var(--accent-gradient);color:#fff;font-size:15px;font-weight:600;text-decoration:none;display:inline-block}
.footer{border-top:1px solid var(--border);padding:48px 32px;text-align:center;color:var(--text-muted);font-size:14px}
</style></head><body>
